# -------------------------------------------------------------------
# GitLab CI/CD recipe for the irides package
# -------------------------------------------------------------------

# build off of miniconda3
image: continuumio/miniconda3

# add relevant packages
default:
  before_script:
    - conda update -n base -c defaults conda
    - conda create --yes -n ci312 python=3.12 coverage flake8 numpy scipy parameterized
    - conda run --no-capture-output -n ci312 pip install -e .
  after_script:
    - conda env remove -n ci312 --yes

# define variables
variables:
  SECRET_DETECTION_ENABLED: 'true'

# call out pipeline stages
stages:
  - test_and_cov
  - secret-detection

# test and run coverage on the repo source code
test_and_cov_src:
  stage: test_and_cov
  coverage: '/TOTAL.*\s+(\d+%)$/'
  script:
    - conda run --no-capture-output -n ci312 python -m unittest discover -v
    - conda run --no-capture-output -n ci312 coverage run --source=src --branch -m unittest && conda run --no-capture-output -n ci312 coverage report -m

# override defaults for the secret detection job
secret_detection:
  stage: secret-detection
  before_script: []  # Prevent conda-related setup
  image: registry.gitlab.com/security-products/secrets:7

include:
  - template: Security/Secret-Detection.gitlab-ci.yml
